<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Jogadores - APECAD 2026</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --azul-escuro: #0f3d73;
        --azul-medio: #1f6ec7;
        --azul-claro: #73bdf5;
        --dourado: #e6b93d;
        --dourado-forte: #c9961d;
        --branco: #ffffff;
        --texto: #17324d;
        --cinza: #6b7f95;
        --borda: #d7e6f7;
        --sucesso: #168a4a;
        --erro: #c0392b;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background:
          linear-gradient(
            180deg,
            rgba(115, 189, 245, 0.2),
            rgba(230, 185, 61, 0.08)
          ),
          linear-gradient(135deg, #eaf4ff, #fffdf7);
        min-height: 100vh;
        padding: 24px 14px;
        color: var(--texto);
      }

      .container {
        max-width: 860px;
        margin: 0 auto;
      }

      .card {
        background: rgba(255, 255, 255, 0.98);
        border: 2px solid rgba(230, 185, 61, 0.18);
        border-radius: 28px;
        box-shadow: 0 18px 45px rgba(15, 61, 115, 0.12);
        padding: 28px;
      }

      .topo {
        text-align: center;
        margin-bottom: 26px;
      }

      .logo-box {
        width: 200px;
        max-width: 100%;
        margin: 0 auto 14px;
      }

      .logo-box img {
        width: 100%;
        display: block;
        object-fit: contain;
      }

      .titulo {
        margin: 0;
        font-size: 30px;
        color: var(--azul-escuro);
        font-weight: 900;
      }

      .subtitulo {
        margin: 10px auto 0;
        max-width: 680px;
        color: var(--cinza);
        font-size: 15px;
        line-height: 1.5;
      }

      .valor-box {
        margin-top: 22px;
        background: linear-gradient(135deg, #f7fbff, #fff9ea);
        border: 1px solid rgba(31, 110, 199, 0.1);
        border-radius: 18px;
        padding: 16px;
        text-align: center;
      }

      .valor-label {
        color: var(--azul-escuro);
        font-weight: 700;
        font-size: 14px;
      }

      .valor-numero {
        margin-top: 6px;
        color: var(--dourado-forte);
        font-size: 28px;
        font-weight: 900;
      }

      form {
        display: grid;
        gap: 16px;
        margin-top: 24px;
      }

      .campo {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .campo label {
        font-size: 14px;
        font-weight: 800;
        color: var(--azul-escuro);
        text-align: left;
        display: block;
      }

      .campo {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: flex-start;
      }

      .campo input,
      .campo select,
      .campo textarea {
        width: 100%;
        min-height: 52px;
        border: 2px solid var(--borda);
        border-radius: 14px;
        padding: 0 14px;
        font-size: 15px;
        color: var(--texto);
        background: var(--branco);
        outline: none;
        transition: 0.2s;
      }

      .campo textarea {
        min-height: 110px;
        padding: 12px 14px;
        resize: vertical;
      }

      .campo input:focus,
      .campo select:focus,
      .campo textarea:focus {
        border-color: var(--azul-claro);
        box-shadow: 0 0 0 4px rgba(115, 189, 245, 0.16);
      }

      .botao-principal {
        height: 56px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          var(--dourado),
          var(--dourado-forte)
        );
        color: white;
        font-size: 17px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(201, 150, 29, 0.22);
        transition: 0.2s;
      }

      .botao-principal:hover {
        transform: translateY(-1px);
        filter: brightness(1.03);
      }

      .botao-principal:disabled,
      .botao-secundario:disabled,
      input:disabled,
      select:disabled,
      textarea:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .mensagem {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 14px;
        display: none;
        font-weight: 700;
        font-size: 14px;
      }

      .mensagem.sucesso {
        display: block;
        background: rgba(22, 138, 74, 0.1);
        border: 1px solid rgba(22, 138, 74, 0.18);
        color: var(--sucesso);
      }

      .mensagem.erro {
        display: block;
        background: rgba(192, 57, 43, 0.08);
        border: 1px solid rgba(192, 57, 43, 0.16);
        color: var(--erro);
      }

      .bloco-pagamento {
        display: none;
        margin-top: 26px;
        background: linear-gradient(180deg, #ffffff, #f7fbff);
        border: 1px solid rgba(31, 110, 199, 0.1);
        border-radius: 22px;
        padding: 20px;
      }

      .bloco-pagamento.ativo {
        display: block;
      }

      .bloco-pagamento h3 {
        margin: 0 0 14px;
        color: var(--azul-escuro);
        font-size: 22px;
      }

      .linha-info {
        margin-bottom: 10px;
        font-size: 14px;
        color: var(--texto);
        line-height: 1.5;
        word-break: break-word;
      }

      .qr-box {
        text-align: center;
        margin: 18px 0;
        display: none;
      }

      .qr-box img {
        max-width: 260px;
        width: 100%;
        border-radius: 14px;
        border: 1px solid #e4edf7;
        background: white;
        padding: 10px;
      }

      .acoes {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .botao-secundario {
        flex: 1 1 220px;
        height: 48px;
        border-radius: 14px;
        border: 1px solid #d8e8fa;
        background: #edf5ff;
        color: var(--azul-escuro);
        font-weight: 800;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .status-pagamento {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 800;
        background: #f6f9fd;
        color: var(--azul-escuro);
        border: 1px solid #e0ebf7;
        line-height: 1.5;
      }

      .loading {
        opacity: 0.75;
        pointer-events: none;
      }

      @media (max-width: 640px) {
        .card {
          padding: 20px;
        }
        .titulo {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card" id="cardPrincipal">
        <div class="topo">
          <div class="logo-box">
            <img src="img/logoapecad.png" alt="Logo do campeonato" />
          </div>

          <h1 class="titulo">Cadastro de Jogadores</h1>
          <p class="subtitulo">
            Preencha os dados do atleta para realizar o cadastro no campeonato.
            Após o envio, os dados serão registrados automaticamente.
          </p>

        <form id="formJogador">
          <div class="campo">
            <label for="nome">Nome Completo</label>
            <input
              type="text"
              id="nome"
              placeholder="Digite o nome completo"
              required
            />
          </div>

          <div class="campo">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              placeholder="Digite seu e-mail"
              required
            />
          </div>

          <div class="campo">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" placeholder="Digite o CPF" required />
          </div>

          <div class="campo">
            <label for="celular">Celular</label>
            <input
              type="text"
              id="celular"
              placeholder="(99) 99999-9999"
              required
            />
          </div>

          <div class="campo">
            <label for="posicao">Posição</label>
            <select id="posicao" required>
              <option value="">Selecione</option>
              <option value="Zagueiro">Zagueiro</option>
              <option value="Meia">Meia</option>
              <option value="Atacante">Atacante</option>
            </select>
          </div>

          <button type="submit" id="btnCadastrar" class="botao-principal">
            Cadastrar Jogador
          </button>
        </form>

        <div id="mensagem" class="mensagem"></div>
      </div>
    </div>

    <script>
      const API_URL =
        "https://script.google.com/macros/s/AKfycby3jGbIATwRqhkX_kgiPE-qgE4BHOvDun6eY68hDS90e8FSTzGsE_vSHkzDauvoNb2yxQ/exec";

      const cardPrincipal = document.getElementById("cardPrincipal");
      const formJogador = document.getElementById("formJogador");
      const mensagem = document.getElementById("mensagem");

      const btnCadastrar = document.getElementById("btnCadastrar");
     
      const campoNome = document.getElementById("nome");
      const campoEmail = document.getElementById("email");
      const campoCpf = document.getElementById("cpf");
      const campoCelular = document.getElementById("celular");
      const campoPosicao = document.getElementById("posicao");

      function mostrarMensagem(texto, tipo) {
        mensagem.className = `mensagem ${tipo}`;
        mensagem.textContent = texto;
      }

      function limparMensagem() {
        mensagem.className = "mensagem";
        mensagem.textContent = "";
      }

      function setLoading(ativo) {
        if (ativo) cardPrincipal.classList.add("loading");
        else cardPrincipal.classList.remove("loading");
      }

      function bloquearFormulario(bloquear) {
        campoNome.disabled = bloquear;
        campoEmail.disabled = bloquear;
        campoCpf.disabled = bloquear;
        campoCelular.disabled = bloquear;
        campoPosicao.disabled = bloquear;
        btnCadastrar.disabled = bloquear;
      }

      function somenteDigitos(valor) {
        return String(valor || "").replace(/\D/g, "");
      }

      function formatarCpf(valor) {
        const v = somenteDigitos(valor).slice(0, 11);
        return v
          .replace(/^(\d{3})(\d)/, "$1.$2")
          .replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3")
          .replace(/\.(\d{3})(\d)/, ".$1-$2");
      }

      function formatarCelular(valor) {
        const numeros = somenteDigitos(valor).slice(0, 11);
        if (numeros.length <= 10) {
          return numeros.replace(
            /(\d{2})(\d{0,4})(\d{0,4})/,
            function (_, a, b, c) {
              let out = a ? `(${a}` : "";
              if (a && a.length === 2) out += ") ";
              if (b) out += b;
              if (c) out += "-" + c;
              return out.trim();
            },
          );
        }
        return numeros.replace(
          /(\d{2})(\d{5})(\d{0,4})/,
          function (_, a, b, c) {
            let out = `(${a}) ${b}`;
            if (c) out += "-" + c;
            return out;
          },
        );
      }

      campoCpf.addEventListener("input", () => {
        campoCpf.value = formatarCpf(campoCpf.value);
      });

      campoCelular.addEventListener("input", () => {
        campoCelular.value = formatarCelular(campoCelular.value);
      });

      function obterPayloadFormulario() {
        return {
          nome: campoNome.value.trim(),
          email: campoEmail.value.trim(),
          cpf: somenteDigitos(campoCpf.value),
          celular: campoCelular.value.trim(),
          posicao: campoPosicao.value,
        };
      }

      function validarFormulario(payload) {
        if (
          !payload.nome ||
          !payload.email ||
          !payload.cpf ||
          !payload.celular ||
          !payload.posicao
        ) {
          mostrarMensagem("Preencha todos os campos.", "erro");
          return false;
        }

        if (payload.cpf.length !== 11) {
          mostrarMensagem("Informe um CPF válido com 11 dígitos.", "erro");
          return false;
        }

        if (!payload.email.includes("@")) {
          mostrarMensagem("Informe um e-mail válido.", "erro");
          return false;
        }

        return true;
      }

      formJogador.addEventListener("submit", async function (e) {
        e.preventDefault();
        limparMensagem();

        const payload = obterPayloadFormulario();

        if (!validarFormulario(payload)) return;

        try {
          setLoading(true);

          const resp = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "text/plain;charset=utf-8",
            },
            body: JSON.stringify({
              rota: "cadastrarJogador",
              nome: payload.nome,
              email: payload.email,
              cpf: payload.cpf,
              celular: payload.celular,
              posicao: payload.posicao,
            }),
          });

          const data = await resp.json();

          if (!data.ok) {
            console.error("Erro API criarPagamento:", data);
            mostrarMensagem(
              data.mensagem || "Erro ao cadastrar jogador.",
              "erro",
            );
            return;
          }

          mostrarMensagem(
            data.mensagem || "Jogador cadastrado com sucesso.",
            "sucesso"
          );

          formJogador.reset();
        } catch (erro) {
          console.error("Erro ao gerar Pix:", erro);
          mostrarMensagem("Erro ao cadastrar jogador.", "erro");
        } finally {
          setLoading(false);
        }
      });

    </script>
  </body>
</html>
